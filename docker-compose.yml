version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: evolution-postgres
    environment:
      - POSTGRES_USER=evolution
      - POSTGRES_PASSWORD=evolution123
      - POSTGRES_DB=evolution_db
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - seniorcare-network

  evolution:
    image: evoapicloud/evolution-api:latest
    container_name: evolution-api
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      - AUTHENTICATION_API_KEY=supersecretkey123
      - SERVER_URL=http://localhost:8080
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution:evolution123@postgres:5432/evolution_db
      - CACHE_REDIS_ENABLED=false
      - TYPEBOT_API=
      - TYPEBOT_URL=
      - CHATWOOT_API=
      - CHATWOOT_URL=
      - RABBITMQ_ENABLED=false
      - WEBSOCKET_ENABLED=true
    volumes:
      - ./evolution-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - seniorcare-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: seniorcare-backend
    ports:
      - "8000:8000"
    environment:
      - EVOLUTION_BASE=http://evolution:8080
      - EVOLUTION_API_KEY=supersecretkey123
      - GOOGLE_API_KEY=AIzaSyA5iAPKucOhe_zjv60vKYCJB1bb4sL4Hnk
    depends_on:
      - evolution
    restart: unless-stopped
    networks:
      - seniorcare-network

networks:
  seniorcare-network:
    driver: bridge